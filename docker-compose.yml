# Docker Compose file for PayOS fintech project
# This setup uses modern Docker Compose syntax without deprecated version field
# All services run inside Docker with a shared network 'payos-network'
# Includes PostgreSQL, Redis, Kafka (KRaft mode), Kafka UI, Redis Commander,
# FastAPI backend, Celery worker, Node.js notification service, React frontend, and Nginx reverse proxy

services:
  postgres:
    image: postgres:15
    container_name: payos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: payos123
      POSTGRES_DB: payos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - payos-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: payos_redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "payos_redis_pass"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - payos-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "payos_redis_pass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Service 3: Zookeeper ────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: payos-zookeeper
    hostname: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 10
      ZOOKEEPER_SYNC_LIMIT: 5
      ZOOKEEPER_MAX_CLIENT_CNXNS: 60
    healthcheck:
      # FIX: cp-zookeeper image ships zkServer.sh — nc is NOT available
      test: ["CMD", "bash", "-c", "echo 'ruok' | timeout 2 bash -c 'cat > /dev/tcp/localhost/2181' && echo OK"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - payos-network
    restart: unless-stopped

  # ─── Service 4: Kafka ────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: payos-kafka
    hostname: kafka
    ports:
      - "9092:9092"
      - "29092:29092"    # internal listener (other containers use this)
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ZOOKEEPER_CONNECTION_TIMEOUT_MS: 60000

      # FIX: Two listeners — one for Docker-internal, one for host access
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG4J_LOGGERS: "kafka.controller=INFO,kafka.producer.async.DefaultEventHandler=INFO,state.change.logger=INFO"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 20s
      timeout: 15s
      retries: 15
      start_period: 60s       # Kafka needs time to register with ZK on Windows
    networks:
      - payos-network
    restart: unless-stopped

  # ─── Kafka topic initialiser (runs once, then exits) ─────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.4.0
    container_name: payos-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      echo 'Waiting for Kafka to be fully ready...'
      sleep 10

      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic payment.processed  --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic payment.failed     --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic fraud.detected     --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic dispute.raised     --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic notification.email --partitions 1 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic notification.sms   --partitions 1 --replication-factor 1

      echo 'All topics created:'
      kafka-topics --bootstrap-server kafka:29092 --list
      "
    networks:
      - payos-network

  # ─── Service 5: Kafka UI ─────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: payos-kafka-ui
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy    # FIX: was missing this condition
    environment:
      KAFKA_CLUSTERS_0_NAME: payos-cluster
      # FIX: use internal listener (kafka:29092), NOT localhost:9092
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      DYNAMIC_CONFIG_ENABLED: "true"
      AUTH_TYPE: "disabled"
    networks:
      - payos-network
    restart: unless-stopped

