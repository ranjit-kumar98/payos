  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: payos_redis_commander
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379:0:payos_redis_pass
    networks:
      - payos-network
    depends_on:
      - redis
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8081"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: payos_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      - payos-network
    depends_on:
      - postgres
      - redis
      - kafka

  celery_worker:
    image: python:3.11-slim
    container_name: payos_celery_worker
    restart: unless-stopped
    command: tail -f /dev/null  # Placeholder to keep container running
    networks:
      - payos-network
    depends_on:
      - backend
      - redis
      - kafka

  notification_service:
    build:
      context: ./notification_service
      dockerfile: Dockerfile
    container_name: payos_notification_service
    restart: unless-stopped
    ports:
      - "3001:3001"
    networks:
      - payos-network
    depends_on:
      - kafka
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: payos_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - payos-network

  nginx:
    image: nginx:stable-alpine
    container_name: payos_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - payos-network
    depends_on:
      - backend
      - notification_service
      - frontend

volumes:
  postgres_data:
  redis_data:
  kafka_data:

networks:
  payos-network:
    driver: bridge