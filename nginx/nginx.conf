# Nginx configuration for PayOS reverse proxy
# Routes:
# /api/ -> FastAPI backend (payos_backend:8000)
# /ws/ -> Node.js notification service (payos_notification_service:3001)
# everything else -> React frontend (payos_frontend:3000)

worker_processes 1;

events {
  worker_connections 1024;
}

http {
  upstream backend {
    server backend:8000;
}

upstream notification_service {
    server notification_service:3001;
}

upstream frontend {
    server frontend:3000;
}

  server {
    listen 80;

    # Proxy /api/ to FastAPI backend with path rewrite to remove /api prefix
    location /api/ {
      rewrite ^/api/(health|health/db)$ /$1 break;
      proxy_pass http://backend/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      rewrite ^/api/(.*)$ /$1 break;
    }

    # Proxy /ws/ to Node.js notification service (WebSocket support)
    location /ws/ {
      proxy_pass http://notification_service/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_cache_bypass $http_upgrade;
    }

    # Everything else to React frontend
    location / {
    proxy_pass http://frontend/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
  }
}